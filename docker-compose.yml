services:
  sharemymarkdown:
    build: .
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sharemymarkdown.rule=Host(`sharemymarkdown.com`)"
      - "traefik.http.routers.sharemymarkdown.entrypoints=websecure"
      - "traefik.http.routers.sharemymarkdown.tls.certresolver=letsencrypt"
      - "traefik.http.services.sharemymarkdown.loadbalancer.server.port=3000"
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
