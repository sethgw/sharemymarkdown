name: Deploy

on:
  push:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Dokploy
        run: |
          curl -X POST "https://dokploy.zeeze.fun/api/trpc/compose.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"json":{"composeId":"Ay_CGNWfYJQUTuadgWpEI"}}'
